<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Login</title>

<style>
:root {
  --neon: #00fff0;
  --pink: #ff00ff;
  --dark: #050510;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background:
    radial-gradient(circle at top, #0f2027, var(--dark));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* ====== CARD ====== */
.card {
  width: 100%;
  max-width: 420px;
  padding: 40px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 0 40px var(--neon);
  position: relative;
}

/* AI SCAN LINE */
.card::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon), transparent);
  top: 0;
  animation: scan 3s infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

p {
  text-align: center;
  opacity: .7;
  margin-bottom: 30px;
}

/* INPUT */
.group {
  position: relative;
  margin-bottom: 25px;
}

.group input {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: none;
  border-bottom: 2px solid rgba(255,255,255,.3);
  color: white;
}

.group label {
  position: absolute;
  top: 50%;
  left: 10px;
  transform: translateY(-50%);
  transition: .3s;
  opacity: .6;
}

.group input:focus + label,
.group input:valid + label {
  top: -8px;
  font-size: .75rem;
  color: var(--neon);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--neon), var(--pink));
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

button.loading {
  pointer-events: none;
  opacity: .7;
}

/* REGISTER LINK */
.link {
  text-align: center;
  margin-top: 20px;
  font-size: .85rem;
  cursor: pointer;
  color: var(--neon);
}

/* ===== MODAL ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal .card {
  box-shadow: 0 0 40px var(--pink);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card">
  <h1>ACCESS</h1>
  <p>Login to Cyber System</p>

  <form onsubmit="login(event)">
    <div class="group">
      <input required>
      <label>Username</label>
    </div>

    <div class="group">
      <input type="password" required>
      <label>Password</label>
    </div>

    <button id="loginBtn">LOGIN</button>
  </form>

  <div class="link" onclick="openRegister()">Create Account</div>
</div>

<!-- REGISTER MODAL -->
<div class="modal" id="registerModal">
  <div class="card">
    <h1>REGISTER</h1>

    <div class="group">
      <input required>
      <label>Username</label>
    </div>

    <div class="group">
      <input type="password" required>
      <label>Password</label>
    </div>

    <button onclick="closeRegister()">REGISTER</button>
  </div>
</div>

<script>
function login(e) {
  e.preventDefault();
  const btn = document.getElementById("loginBtn");
  btn.classList.add("loading");
  btn.innerText = "LOADING...";

  setTimeout(() => {
    btn.innerText = "SUCCESS";
  }, 2000);
}

function openRegister() {
  document.getElementById("registerModal").classList.add("active");
}

function closeRegister() {
  document.getElementById("registerModal").classList.remove("active");
}
</script>

</body>
</html>
