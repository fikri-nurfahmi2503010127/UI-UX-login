<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cyber Login Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #00f7ff;
  --secondary: #ff00f7;
  --dark: #050816;
  --dark2: #0b1023;
  --glass: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.12);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.7);
  --success: #00ff88;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  font-family: 'Poppins', sans-serif;
}

body {
  background:
    radial-gradient(circle at top left, rgba(0,247,255,0.15), transparent 30%),
    radial-gradient(circle at bottom right, rgba(255,0,247,0.15), transparent 30%),
    linear-gradient(135deg, var(--dark), var(--dark2));
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: var(--text);
  padding: 20px;
}

/* Animated background */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(80px);
  z-index: 0;
}

body::before {
  background: rgba(0,247,255,0.15);
  top: -100px;
  left: -100px;
}

body::after {
  background: rgba(255,0,247,0.15);
  bottom: -100px;
  right: -100px;
}

.container {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 440px;
}

.card {
  width: 100%;
  padding: 40px 30px;
  background: var(--glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  box-shadow:
    0 0 30px rgba(0,247,255,0.2),
    0 0 80px rgba(255,0,247,0.1);
  overflow: hidden;
  position: relative;
  animation: fadeUp .7s ease;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 28px;
  padding: 1px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.logo {
  width: 75px;
  height: 75px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  font-weight: bold;
  font-family: 'Orbitron', sans-serif;
  box-shadow: 0 0 25px rgba(0,247,255,0.4);
}

h1 {
  text-align: center;
  font-size: 2rem;
  margin-bottom: 8px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 30px;
}

.group {
  position: relative;
  margin-bottom: 24px;
}

.group input {
  width: 100%;
  padding: 16px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
  color: white;
  outline: none;
  transition: .3s;
  font-size: .95rem;
}

.group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 15px rgba(0,247,255,0.25);
}

.group label {
  position: absolute;
  top: 50%;
  left: 14px;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.6);
  transition: .25s ease;
  pointer-events: none;
  font-size: .9rem;
}

.group input:focus + label,
.group input:valid + label {
  top: 0;
  left: 12px;
  background: #11172c;
  padding: 0 6px;
  border-radius: 8px;
  color: var(--primary);
  font-size: .72rem;
}

.password-box {
  position: relative;
}

.toggle-password {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: rgba(255,255,255,0.6);
  font-size: .85rem;
}

.options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 25px;
  font-size: .85rem;
}

.options label {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
}

.options a {
  color: var(--primary);
  text-decoration: none;
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: .3s ease;
  font-size: .95rem;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0,247,255,0.25);
}

button.loading {
  opacity: .8;
  pointer-events: none;
}

.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 25px 0;
  color: rgba(255,255,255,0.5);
  font-size: .8rem;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.1);
}

.social-login {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.social-btn {
  padding: 13px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  text-align: center;
  cursor: pointer;
  transition: .3s;
}

.social-btn:hover {
  background: rgba(255,255,255,0.1);
}

.link {
  text-align: center;
  margin-top: 24px;
  font-size: .9rem;
  color: var(--muted);
}

.link span {
  color: var(--primary);
  cursor: pointer;
  font-weight: 500;
}

.status {
  margin-top: 18px;
  text-align: center;
  font-size: .9rem;
  color: var(--success);
  display: none;
}

/* Modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 99;
}

.modal.active {
  display: flex;
}

.modal .card {
  max-width: 420px;
}

.close-btn {
  position: absolute;
  top: 15px;
  right: 18px;
  cursor: pointer;
  font-size: 1.2rem;
  opacity: 0.7;
}

/* Responsive */
@media (max-width: 500px) {
  .card {
    padding: 32px 22px;
    border-radius: 22px;
  }

  h1 {
    font-size: 1.6rem;
  }

  .social-login {
    grid-template-columns: 1fr;
  }

  .options {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <div class="logo">AI</div>

    <h1>CYBER ACCESS</h1>
    <p class="subtitle">Secure login for futuristic system panel</p>

    <form onsubmit="login(event)">

      <div class="group">
        <input type="text" required />
        <label>Username</label>
      </div>

      <div class="group password-box">
        <input type="password" id="password" required />
        <label>Password</label>
        <span class="toggle-password" onclick="togglePassword()">SHOW</span>
      </div>

      <div class="options">
        <label>
          <input type="checkbox" /> Remember me
        </label>

        <a href="#">Forgot Password?</a>
      </div>

      <button id="loginBtn">LOGIN NOW</button>

      <div class="status" id="statusMsg">
        Login successful ✔
      </div>

    </form>

    <div class="divider">OR CONTINUE WITH</div>

    <div class="social-login">
      <div class="social-btn">Google</div>
      <div class="social-btn">GitHub</div>
    </div>

    <div class="link">
      Don't have an account?
      <span onclick="openRegister()">Create Account</span>
    </div>

  </div>
</div>

<!-- Register Modal -->
<div class="modal" id="registerModal">
  <div class="card">

    <div class="close-btn" onclick="closeRegister()">✕</div>

    <div class="logo">+</div>

    <h1>REGISTER</h1>
    <p class="subtitle">Create your cyber account</p>

    <div class="group">
      <input type="text" required />
      <label>Full Name</label>
    </div>

    <div class="group">
      <input type="email" required />
      <label>Email Address</label>
    </div>

    <div class="group">
      <input type="text" required />
      <label>Username</label>
    </div>

    <div class="group password-box">
      <input type="password" id="registerPassword" required />
      <label>Password</label>
      <span class="toggle-password" onclick="toggleRegisterPassword()">SHOW</span>
    </div>

    <button onclick="registerUser()">CREATE ACCOUNT</button>

  </div>
</div>

<script>
function login(e) {
  e.preventDefault();

  const btn = document.getElementById('loginBtn');
  const status = document.getElementById('statusMsg');

  btn.classList.add('loading');
  btn.innerHTML = 'AUTHENTICATING...';

  setTimeout(() => {
    btn.innerHTML = 'ACCESS GRANTED';
    status.style.display = 'block';

    setTimeout(() => {
      btn.innerHTML = 'LOGIN NOW';
      btn.classList.remove('loading');
      status.style.display = 'none';
    }, 2500);

  }, 2000);
}

function togglePassword() {
  const input = document.getElementById('password');
  const toggle = document.querySelector('.toggle-password');

  if(input.type === 'password') {
    input.type = 'text';
    toggle.innerHTML = 'HIDE';
  } else {
    input.type = 'password';
    toggle.innerHTML = 'SHOW';
  }
}

function toggleRegisterPassword() {
  const input = document.getElementById('registerPassword');
  const toggle = document.querySelectorAll('.toggle-password')[1];

  if(input.type === 'password') {
    input.type = 'text';
    toggle.innerHTML = 'HIDE';
  } else {
    input.type = 'password';
    toggle.innerHTML = 'SHOW';
  }
}

function openRegister() {
  document.getElementById('registerModal').classList.add('active');
}

function closeRegister() {
  document.getElementById('registerModal').classList.remove('active');
}

function registerUser() {
  alert('Account created successfully!');
  closeRegister();
}

window.onclick = function(e) {
  const modal = document.getElementById('registerModal');

  if(e.target === modal) {
    closeRegister();
  }
}
</script>

</body>
</html>
